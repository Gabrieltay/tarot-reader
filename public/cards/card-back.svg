<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 600" width="360" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1E5F"/>
      <stop offset="55%" stop-color="#1F1745"/>
      <stop offset="100%" stop-color="#160F30"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#D6B56A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#D6B56A" stop-opacity="0"/>
    </radialGradient>
    <g id="star">
      <circle r="1.4" fill="#F7F1E6" opacity="0.55"/>
    </g>
  </defs>

  <rect width="360" height="600" rx="20" fill="url(#bg)"/>
  <rect width="360" height="600" rx="20" fill="url(#glow)"/>

  <!-- outer frame -->
  <rect x="16" y="16" width="328" height="568" rx="14" fill="none" stroke="#D6B56A" stroke-width="1" opacity="0.55"/>
  <rect x="22" y="22" width="316" height="556" rx="10" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.35"/>

  <!-- corner flourishes -->
  <g fill="none" stroke="#D6B56A" stroke-width="1.1" stroke-linecap="round" opacity="0.85">
    <path d="M26 26 C 36 28, 42 36, 40 48 C 48 42, 56 44, 60 54"/>
    <path d="M334 26 C 324 28, 318 36, 320 48 C 312 42, 304 44, 300 54"/>
    <path d="M26 574 C 36 572, 42 564, 40 552 C 48 558, 56 556, 60 546"/>
    <path d="M334 574 C 324 572, 318 564, 320 552 C 312 558, 304 556, 300 546"/>
  </g>
  <g fill="#D6B56A" opacity="0.85">
    <circle cx="60" cy="54" r="2"/>
    <circle cx="300" cy="54" r="2"/>
    <circle cx="60" cy="546" r="2"/>
    <circle cx="300" cy="546" r="2"/>
  </g>

  <!-- scattered stars -->
  <use href="#star" x="60" y="90"/>
  <use href="#star" x="300" y="120"/>
  <use href="#star" x="80" y="480"/>
  <use href="#star" x="290" y="470"/>
  <use href="#star" x="48" y="300"/>
  <use href="#star" x="312" y="300"/>
  <use href="#star" x="180" y="70"/>
  <use href="#star" x="180" y="530"/>

  <!-- sacred geometry rings -->
  <circle cx="180" cy="255" r="92" fill="none" stroke="#D6B56A" stroke-width="0.6" opacity="0.5"/>
  <circle cx="180" cy="255" r="70" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.4"/>
  <circle cx="180" cy="255" r="70" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.25" transform="translate(-24 -14)"/>
  <circle cx="180" cy="255" r="70" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.25" transform="translate(24 -14)"/>
  <circle cx="180" cy="255" r="70" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.25" transform="translate(-24 14)"/>
  <circle cx="180" cy="255" r="70" fill="none" stroke="#D6B56A" stroke-width="0.5" opacity="0.25" transform="translate(24 14)"/>

  <!-- crescent moon -->
  <path
    d="M198 205
       a 46 46 0 1 0 0 92
       a 37 37 0 1 1 0 -92 Z"
    fill="none"
    stroke="#D6B56A"
    stroke-width="1.4"
    opacity="0.9"
  />
  <circle cx="160" cy="221" r="1.6" fill="#F7F1E6" opacity="0.8"/>
  <circle cx="150" cy="255" r="1.2" fill="#F7F1E6" opacity="0.65"/>
  <circle cx="160" cy="289" r="1.6" fill="#F7F1E6" opacity="0.8"/>

  <!-- lower emblem: thin diamond with center dot -->
  <path d="M180 420 L196 448 L180 476 L164 448 Z" fill="none" stroke="#D6B56A" stroke-width="0.9" opacity="0.7"/>
  <circle cx="180" cy="448" r="2.4" fill="#D6B56A" opacity="0.8"/>
  <path d="M140 448 H164 M196 448 H220" stroke="#D6B56A" stroke-width="0.7" opacity="0.55"/>
</svg>
